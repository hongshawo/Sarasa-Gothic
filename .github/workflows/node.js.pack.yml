# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js.pack CI

on: workflow_dispatch

jobs:
  build:

    runs-on: ubuntu-22.04
    # runs-on: self-hosted
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - run: |
        mkdir -p $HOME/.local/bin && cp -nv 7za.bin $HOME/.local/bin/7za
        chmod -v 755 $HOME/.local/bin/7za
        echo '<pwd>'; pwd
        echo '<ls>'; ls -aFl
    - run: |
        et='Z2l0aHViX3BhdF8xMUFTTjRMNVEwUWFMdTFaRlVGVHVLX1NCdFJMRnNzOVk2dm'
        et="$et"'56Z0l3TXhsOVZ2ZlUyc1FjU29IWTM4ZXR4UldTMFM3M0FFMkdZQnVZMFNvN3cz'

        rid=(18239754342 18241559756)
        aid=(4181521981 4181949096)
        f=('out_cl_01-02.zip' 'out_cl_03-04.zip')
        l=('SC')
        c=7 # 0-7-9
        v='0.1.0.33.0'

        t=$(echo "$et" | base64 -di)

        for i in $(seq 0 $((${#f[@]}-1)))
        do
            url=$(curl -H "Authorization: Bearer $t" \
                -L "https://api.github.com/repos/hongshawo/Sarasa-Gothic/actions/runs/${rid[$i]}/artifacts" | \
                jq -j ".artifacts | .[] | select(.id == ${aid[$i]}) | .archive_download_url")
            echo 'echo'; echo "$url"
            curl -H "Authorization: Bearer $t" -o "${f[$i]}" -L "$url"
        done

        for n in "${f[@]}"
        do
            unzip -n "$n"
        done

        dir=$PWD

        cd TTF
        for e in "${l[@]}"
        do
            7za a -mx=$c "$dir/SarasaStatic$e-TTF-$v.7z" SarasaStatic"$e"-*.ttf
            7za a -mx=$c "$dir/SarasaStaticSlab$e-TTF-$v.7z" SarasaStaticSlab"$e"-*.ttf
        done
        cd "$dir";

        cd TTF-Unhinted
        for e in "${l[@]}"
        do
            7za a -mx=$c "$dir/SarasaStatic$e-TTF-Unhinted-$v.7z" SarasaStatic"$e"-*.ttf
            7za a -mx=$c "$dir/SarasaStaticSlab$e-TTF-Unhinted-$v.7z" SarasaStaticSlab"$e"-*.ttf
        done
        cd "$dir";
    - run: |
        echo '<ls>'; ls -aFl
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SarasaStaticSC-TTF-0.1.0.33.0.7z
        path: SarasaStaticSC-TTF-0.1.0.33.0.7z
        if-no-files-found: warn
        compression-level: 0
    - name: Upload Artifacts 2
      uses: actions/upload-artifact@v4
      with:
        name: SarasaStaticSlabSC-TTF-0.1.0.33.0.7z
        path: SarasaStaticSlabSC-TTF-0.1.0.33.0.7z
        if-no-files-found: warn
        compression-level: 0
    - name: Upload Artifacts 3
      uses: actions/upload-artifact@v4
      with:
        name: SarasaStaticSC-TTF-Unhinted-0.1.0.33.0.7z
        path: SarasaStaticSC-TTF-Unhinted-0.1.0.33.0.7z
        if-no-files-found: warn
        compression-level: 0
    - name: Upload Artifacts 4
      uses: actions/upload-artifact@v4
      with:
        name: SarasaStaticSlabSC-TTF-Unhinted-0.1.0.33.0.7z
        path: SarasaStaticSlabSC-TTF-Unhinted-0.1.0.33.0.7z
        if-no-files-found: warn
        compression-level: 0
